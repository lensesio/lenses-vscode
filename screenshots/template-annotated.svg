<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <!-- Background -->
    <radialGradient id="bgGlow1" cx="28%" cy="22%" r="62%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#A78BFA" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0B1020" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow2" cx="76%" cy="74%" r="70%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#22D3EE" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0B1020" stop-opacity="0"/>
    </radialGradient>

    <!-- Shadow + glass -->
    <filter id="shadowSoft" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.22"/>
    </filter>

    <linearGradient id="glassStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.52"/>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>

    <linearGradient id="specular" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.07"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Callout styling -->
    <filter id="calloutShadow" x="-50%" y="-50%" width="200%" height="220%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <linearGradient id="calloutFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.14"/>
    </linearGradient>

    <!-- Main rounded-rect clip -->
    <clipPath id="shotClip">
      <rect x="150" y="130" width="1300" height="740" rx="26" ry="26"/>
    </clipPath>

    <clipPath id="shotClipInset">
      <rect x="156" y="136" width="1288" height="728" rx="22" ry="22"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="1000" fill="#0B1020"/>
  <rect x="0" y="0" width="1600" height="1000" fill="url(#bgGlow1)"/>
  <rect x="0" y="0" width="1600" height="1000" fill="url(#bgGlow2)"/>

  <!-- Frame group -->
  <g filter="url(#shadowSoft)">
    <rect x="150" y="130" width="1300" height="740" rx="26" ry="26" fill="#0E1630" fill-opacity="0.78"/>
    <rect x="150" y="130" width="1300" height="740" rx="26" ry="26" fill="none" stroke="url(#glassStroke)" stroke-width="1.5"/>

    <!-- Screenshot image -->
    <image x="150" y="130" width="1300" height="740" href="raw.png" preserveAspectRatio="xMidYMid slice" clip-path="url(#shotClip)"/>

    <!-- Glass/specular highlight -->
    <g clip-path="url(#shotClipInset)">
      <path d="M 130 150 C 420 70, 860 70, 1560 320 L 1560 140 L 130 140 Z" fill="url(#specular)" opacity="0.9"/>
      <path d="M 130 220 C 520 110, 980 120, 1560 380" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="2"/>
    </g>
  </g>

  <!-- Callouts: tweak label text + anchor points as desired -->
  <!-- Callout 1 -->
  <g filter="url(#calloutShadow)">
    <path d="M 190 255 C 255 255, 290 255, 350 255" fill="none" stroke="#22D3EE" stroke-opacity="0.75" stroke-width="2"/>
    <circle cx="190" cy="255" r="6" fill="#22D3EE" fill-opacity="0.95"/>
    <rect x="350" y="232" width="240" height="46" rx="14" ry="14" fill="url(#calloutFill)" stroke="#22D3EE" stroke-opacity="0.55" stroke-width="1"/>
    <text x="372" y="262" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="16" fill="#E7ECFF">
      Environments tree
    </text>
  </g>

  <!-- Callout 2 -->
  <g filter="url(#calloutShadow)">
    <path d="M 1080 190 C 1120 190, 1160 190, 1210 190" fill="none" stroke="#A78BFA" stroke-opacity="0.80" stroke-width="2"/>
    <circle cx="1080" cy="190" r="6" fill="#A78BFA" fill-opacity="0.95"/>
    <rect x="1210" y="167" width="255" height="46" rx="14" ry="14" fill="url(#calloutFill)" stroke="#A78BFA" stroke-opacity="0.55" stroke-width="1"/>
    <text x="1232" y="197" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="16" fill="#E7ECFF">
      Provisioning.yaml editor
    </text>
  </g>

  <!-- Callout 3 -->
  <g filter="url(#calloutShadow)">
    <path d="M 980 705 C 1030 705, 1090 705, 1160 705" fill="none" stroke="#22D3EE" stroke-opacity="0.75" stroke-width="2"/>
    <circle cx="980" cy="705" r="6" fill="#22D3EE" fill-opacity="0.95"/>
    <rect x="1160" y="682" width="260" height="46" rx="14" ry="14" fill="url(#calloutFill)" stroke="#22D3EE" stroke-opacity="0.55" stroke-width="1"/>
    <text x="1182" y="712" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="16" fill="#E7ECFF">
      Side-by-side diff view
    </text>
  </g>

  <!-- Small caption -->
  <g opacity="0.92">
    <text x="150" y="930" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="28" fill="#E7ECFF">
      Manage Kafka with Lenses — inside VS Code
    </text>
    <text x="150" y="965" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="18" fill="#B7C2F3" opacity="0.95">
      Browsing, provisioning, and comparisons with a native developer workflow.
    </text>
  </g>
</svg>


