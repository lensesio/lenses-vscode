<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <!-- Background -->
    <radialGradient id="bgGlow1" cx="30%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#22D3EE" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0B1020" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow2" cx="78%" cy="72%" r="70%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#A78BFA" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0B1020" stop-opacity="0"/>
    </radialGradient>

    <!-- Shadow + glass -->
    <filter id="shadowSoft" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.22"/>
    </filter>

    <linearGradient id="glassStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.50"/>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>

    <linearGradient id="specular" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Main rounded-rect clip -->
    <clipPath id="shotClip">
      <rect x="150" y="130" width="1300" height="740" rx="26" ry="26"/>
    </clipPath>

    <!-- Subtle top highlight clip (same shape, inset) -->
    <clipPath id="shotClipInset">
      <rect x="156" y="136" width="1288" height="728" rx="22" ry="22"/>
    </clipPath>
  </defs>

  <!-- Canvas background (neutral, works on Marketplace white too) -->
  <rect x="0" y="0" width="1600" height="1000" fill="#0B1020"/>
  <rect x="0" y="0" width="1600" height="1000" fill="url(#bgGlow1)"/>
  <rect x="0" y="0" width="1600" height="1000" fill="url(#bgGlow2)"/>

  <!-- Frame group -->
  <g filter="url(#shadowSoft)">
    <!-- Outer glass frame -->
    <rect x="150" y="130" width="1300" height="740" rx="26" ry="26" fill="#0E1630" fill-opacity="0.78"/>
    <rect x="150" y="130" width="1300" height="740" rx="26" ry="26" fill="none" stroke="url(#glassStroke)" stroke-width="1.5"/>

    <!-- Screenshot image (replace raw.png with your screenshot) -->
    <image x="150" y="130" width="1300" height="740" href="raw.png" preserveAspectRatio="xMidYMid slice" clip-path="url(#shotClip)"/>

    <!-- Subtle glass/specular highlight -->
    <g clip-path="url(#shotClipInset)">
      <path d="M 130 150 C 420 70, 860 70, 1560 320 L 1560 140 L 130 140 Z" fill="url(#specular)" opacity="0.9"/>
      <path d="M 130 220 C 520 110, 980 120, 1560 380" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="2"/>
    </g>
  </g>

  <!-- Optional caption area (delete if not needed) -->
  <g opacity="0.92">
    <text x="150" y="930" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="28" fill="#E7ECFF">
      Lenses VS Code Extension
    </text>
    <text x="150" y="965" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="18" fill="#B7C2F3" opacity="0.95">
      Provisioning, environments, and schema registry—inside your editor.
    </text>
  </g>
</svg>


